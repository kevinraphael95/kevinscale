<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KevinScale — Résultats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div id="header">
    <div class="headerLeft">
      <a href="index.html" title="Accueil"><i class="fa fa-home"></i></a>
      <a href="index.html#help" title="Aide"><i class="fa fa-question-circle"></i></a>
    </div>
    <div class="headerMiddle">
      <h1><a href="index.html">KevinScale</a></h1>
    </div>
    <div class="headerRight"></div>
  </div>
</header>

<div class="results-wrap">

  <p class="results-intro">
    Le résultat de votre KevinScale est décomposé en <strong id="axes-count">11</strong> axes.
    Chaque axe indique votre positionnement par rapport à Kévin sur deux idéologies opposées.
  </p>

  <!-- Score global + verdict -->
  <div class="global-score-line">
    <div class="global-score-num"><span id="global-score">—</span><span style="font-size:1.8rem">%</span></div>
    <span class="global-score-lbl">de compatibilité avec Kévin</span>
  </div>

  <div class="verdict-title" id="verdict-title"></div>
  <div class="verdict-text"  id="verdict-text"></div>

  <!-- Carte résultats avec barres -->
  <div class="results-card" id="results-card">
    <div class="results-card-header">
      <div class="results-site-name">KevinScale</div>
      <div class="results-label-row" id="label-row"></div>
    </div>
    <div id="axes-list"></div>
  </div>

  <!-- URL partage -->
  <div style="text-align:center;margin-bottom:20px;">
    <input type="text" id="share-url" readonly
      style="width:100%;max-width:480px;padding:8px 12px;border:1px solid #ccc;border-radius:4px;font-size:0.82rem;color:#555;text-align:center;background:#f9f9f9;" />
  </div>

  <!-- Actions -->
  <div class="results-actions">
    <button class="btn-action" onclick="location.href='index.html'">↺ Recommencer</button>
    <button class="btn-action" id="btn-copy" onclick="copyShare()">⎘ Copier le lien</button>
    <button class="btn-action" onclick="downloadImage()">⬇ Télécharger</button>
  </div>

</div>

<footer>
  Un test inspiré de <a href="https://politiscales.fr" target="_blank">PolitiScales</a>. Résultats calculés localement · Aucune donnée collectée.
</footer>

<script src="questions.js"></script>
<script>
(function() {
  "use strict";

  // ── Récupération des scores ─────────────────────────────
  const raw = sessionStorage.getItem("ks_scores");
  if (!raw) { window.location.href = "index.html"; return; }
  const scores = JSON.parse(raw);

  // ── Score global ────────────────────────────────────────
  const global = Math.round(AXES.reduce((s, a) => s + scores[a.id], 0) / AXES.length);
  document.getElementById("global-score").textContent = global;

  // ── Verdict ─────────────────────────────────────────────
  const verdict = VERDICTS.find(v => global >= v.min) || VERDICTS[VERDICTS.length - 1];
  document.getElementById("verdict-title").textContent = verdict.emoji + " " + verdict.title;
  document.getElementById("verdict-text").textContent  = verdict.text;

  // ── Labels ──────────────────────────────────────────────
  const labelRow = document.getElementById("label-row");
  const LABEL_COLORS = ["#e63946","#e040fb","#ffd600","#43a047","#29b6f6","#26c6da","#ffca28","#a5d6a7","#f48fb1","#ff7043","#00e5ff"];
  AXES.forEach((axis, i) => {
    const score = scores[axis.id];
    const side  = score < 50 ? axis.left.label : axis.right.label;
    const color = score < 50 ? axis.left.color : axis.right.color;
    const tag = document.createElement("span");
    tag.className = "results-label-tag";
    tag.style.background = color;
    tag.textContent = side;
    labelRow.appendChild(tag);
  });

  // ── Axes ────────────────────────────────────────────────
  const axesList = document.getElementById("axes-list");

  AXES.forEach(axis => {
    const score    = scores[axis.id];
    const leftPct  = score;
    const rightPct = 100 - score;
    const kevinPct = axis.kevinPosition;

    const row = document.createElement("div");
    row.className = "axis-row";
    row.style.opacity = "0";
    row.style.transform = "translateY(8px)";
    row.style.transition = "opacity .4s ease, transform .4s ease";

    row.innerHTML = `
      <div class="axis-row-label-left" style="color:${axis.left.color}">
        ${axis.left.label}
      </div>
      <div class="axis-bar-wrap">
        <div style="font-size:9px;color:#aaa;text-align:right;margin-bottom:14px;letter-spacing:.5px;">
          ${axis.icon} ${axis.label.toUpperCase()}
        </div>
        <div class="axis-bar-track" style="position:relative;">
          <div class="axis-bar-left"  style="width:${leftPct}%;background:${axis.left.color};">
            ${leftPct > 12 ? leftPct + "%" : ""}
          </div>
          <div class="axis-bar-right" style="width:${rightPct}%;background:${axis.right.color};">
            ${rightPct > 12 ? rightPct + "%" : ""}
          </div>
          <div class="axis-kevin-label" style="left:${kevinPct}%">K</div>
          <div class="axis-kevin-marker" style="left:${kevinPct}%"></div>
        </div>
      </div>
      <div class="axis-row-label-right" style="color:${axis.right.color}">
        ${axis.right.label}
      </div>
    `;

    axesList.appendChild(row);
  });

  // Reveal animé
  setTimeout(() => {
    document.querySelectorAll(".axis-row").forEach((row, i) => {
      setTimeout(() => {
        row.style.opacity = "1";
        row.style.transform = "translateY(0)";
      }, i * 60);
    });
  }, 200);

  // ── URL de partage ─────────────────────────────────────
  const encoded = btoa(JSON.stringify(scores));
  const shareUrl = window.location.origin + window.location.pathname + "?r=" + encoded;
  document.getElementById("share-url").value = shareUrl;

  // ── Copier lien ────────────────────────────────────────
  window.copyShare = function() {
    const url = document.getElementById("share-url").value;
    const score = global;
    const text  = `J'ai fait le KevinScale : ${score}% de compatibilité avec Kévin — "${verdict.title}". Et toi ? ${url}`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById("btn-copy");
      const orig = btn.textContent;
      btn.textContent = "✓ Copié !";
      setTimeout(() => btn.textContent = orig, 2000);
    });
  };

  // ── Télécharger image ──────────────────────────────────
  window.downloadImage = function() {
    const W = 900, H = 660;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#f0f0f0";
    ctx.fillRect(0, 0, W, H);

    // Header violet
    ctx.fillStyle = "#6a0dad";
    ctx.fillRect(0, 0, W, 70);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("KevinScale", W / 2, 44);

    // Score
    ctx.fillStyle = "#6a0dad";
    ctx.font = "bold 52px Arial";
    ctx.textAlign = "left";
    ctx.fillText(global + "%", 36, 130);
    ctx.fillStyle = "#555";
    ctx.font = "18px Arial";
    ctx.fillText("de compatibilité avec Kévin  —  " + verdict.emoji + " " + verdict.title, 36, 158);

    // Axes
    const padX = 36, startY = 188;
    const barW  = W - padX * 2 - 220;
    const barOX = 110;
    const rowH  = 42;

    AXES.forEach((axis, i) => {
      const score   = scores[axis.id];
      const ky      = startY + i * rowH;
      const leftW   = (score / 100) * barW;
      const rightW  = barW - leftW;
      const kevinX  = padX + barOX + (axis.kevinPosition / 100) * barW;

      // Labels
      ctx.font = "11px Arial";
      ctx.textAlign = "right";
      ctx.fillStyle = axis.left.color;
      ctx.fillText(axis.left.label, padX + barOX - 6, ky + 14);
      ctx.textAlign = "left";
      ctx.fillStyle = axis.right.color;
      ctx.fillText(axis.right.label, padX + barOX + barW + 6, ky + 14);

      // Barre gauche
      ctx.fillStyle = axis.left.color;
      ctx.beginPath();
      ctx.roundRect(padX + barOX, ky, leftW, 18, [3, 0, 0, 3]);
      ctx.fill();

      // Barre droite
      ctx.fillStyle = axis.right.color;
      ctx.beginPath();
      ctx.roundRect(padX + barOX + leftW, ky, rightW, 18, [0, 3, 3, 0]);
      ctx.fill();

      // Kevin marker
      ctx.fillStyle = "rgba(255,255,255,.8)";
      ctx.fillRect(kevinX - 1, ky, 2, 18);

      // Score %
      ctx.fillStyle = "#111";
      ctx.font = "bold 11px Arial";
      ctx.textAlign = "left";
      ctx.fillText(score + "%", padX + barOX + barW + 90, ky + 14);
    });

    // Footer
    ctx.fillStyle = "#aaa";
    ctx.font = "10px Arial";
    ctx.textAlign = "center";
    ctx.fillText("kevinscale · Résultats calculés localement", W / 2, H - 16);

    const link = document.createElement("a");
    link.download = "kevinscale.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

})();
</script>

</body>
</html>
