<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KevinScale — Quiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div id="header">
    <div class="headerLeft">
      <a href="index.html" title="Accueil"><i class="fa fa-home"></i></a>
      <a href="about.html" title="Aide"><i class="fa fa-question-circle"></i></a>
    </div>
    <div class="headerMiddle">
      <h1><a href="index.html">KevinScale</a></h1>
    </div>
    <div class="headerRight"></div>
  </div>
</header>

<div class="quiz-wrap">

  <div class="progress-bar-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span id="q-progress-label" style="font-size:0.82rem;color:#888;letter-spacing:.5px;text-transform:uppercase;">Question 1 sur —</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="q-text-wrap">
    <div class="q-text" id="q-text">Chargement…</div>
  </div>

  <div class="answer-list" id="answer-list"></div>

  <div class="quiz-nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQ()" disabled>← Précédent</button>
  </div>

</div>

<footer>
  Un test inspiré de <a href="https://politiscales.fr" target="_blank">PolitiScales</a>.
</footer>

<script src="questions.js"></script>
<script>
(function() {
  "use strict";

  const ANSWERS = [
    { text: "Absolument d'accord",  cls: "agree-2"    },
    { text: "Plutôt d'accord",      cls: "agree-1"    },
    { text: "Neutre ou hésitant",   cls: "neutral"    },
    { text: "Plutôt pas d'accord",  cls: "disagree-1" },
    { text: "Pas du tout d'accord", cls: "disagree-2" },
  ];

  let state = { current: 0, answers: {}, shuffled: [] };

  // ── Mélange par axe (interleaved) ──────────────────────
  function shuffle(arr) {
    const byAxis = {};
    arr.forEach(q => {
      if (!byAxis[q.axis]) byAxis[q.axis] = [];
      byAxis[q.axis].push(q);
    });
    Object.values(byAxis).forEach(g => {
      for (let i = g.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [g[i], g[j]] = [g[j], g[i]];
      }
    });
    const keys = Object.keys(byAxis);
    const result = [];
    let round = 0;
    while (result.length < arr.length) {
      keys.forEach(k => { if (byAxis[k][round]) result.push(byAxis[k][round]); });
      round++;
    }
    return result;
  }

  // ── Sélection mode court : 30 questions, ~4 par axe ────
  function selectShort(all) {
    const byAxis = {};
    all.forEach(q => {
      if (!byAxis[q.axis]) byAxis[q.axis] = [];
      byAxis[q.axis].push(q);
    });
    // Mélanger chaque groupe puis prendre ~4 par axe (30 / 8 ≈ 3-4)
    const perAxis = Math.ceil(30 / AXES.length); // 4
    let pool = [];
    Object.values(byAxis).forEach(g => {
      const shuffled = [...g].sort(() => Math.random() - .5);
      pool.push(...shuffled.slice(0, perAxis));
    });
    // Si trop (32) → couper à 30 aléatoirement
    pool = pool.sort(() => Math.random() - .5).slice(0, 30);
    return shuffle(pool);
  }

  function render(index) {
    const q = state.shuffled[index];
    if (!q) return;
    const total = state.shuffled.length;
    const pct = Math.round((index / total) * 100);

    document.getElementById("q-text").textContent = q.text;
    document.getElementById("q-progress-label").textContent = `Question ${index + 1} sur ${total}`;
    document.getElementById("progress-fill").style.width = pct + "%";

    const list = document.getElementById("answer-list");
    list.innerHTML = "";
    ANSWERS.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "ans-btn " + opt.cls;
      btn.textContent = opt.text;
      if (state.answers[q.id] === i) btn.classList.add("selected");
      btn.addEventListener("click", () => select(q.id, i));
      list.appendChild(btn);
    });
    const backBtn = document.createElement("button");
    backBtn.className = "ans-btn back-btn";
    backBtn.textContent = "Retour à l'accueil";
    backBtn.addEventListener("click", () => { window.location.href = "index.html"; });
    list.appendChild(backBtn);

    document.getElementById("btn-prev").disabled = index === 0;
  }

  function advance() {
    if (state.current >= state.shuffled.length - 1) {
      // ── Calcul scores par comparaison avec kevinAnswer ──
      // proximité question = 1 - |userAnswer - kevinAnswer| / 4
      // score axe = moyenne des proximités de toutes ses questions répondues
      const axisData = {};
      AXES.forEach(a => axisData[a.id] = { total: 0, count: 0 });

      state.shuffled.forEach(q => {
        const userVal = state.answers[q.id];
        if (userVal === undefined) return;
        const prox = 1 - Math.abs(userVal - q.kevinAnswer) / 4;
        axisData[q.axis].total += prox;
        axisData[q.axis].count += 1;
      });

      const final = {};
      AXES.forEach(a => {
        const { total, count } = axisData[a.id];
        final[a.id] = count === 0 ? 50 : Math.round((total / count) * 100);
      });
      sessionStorage.setItem("ks_scores", JSON.stringify(final));
      window.location.href = "results.html";
    } else {
      state.current++;
      sessionStorage.setItem("ks_current", state.current);
      render(state.current);
    }
  }

  function select(qId, val) {
    state.answers[qId] = val;
    sessionStorage.setItem("ks_answers", JSON.stringify(state.answers));
    document.querySelectorAll(".ans-btn:not(.back-btn)").forEach((b, i) => {
      b.classList.toggle("selected", i === val);
    });
    setTimeout(advance, 280);
  }

  window.prevQ = function() {
    if (state.current > 0) {
      state.current--;
      sessionStorage.setItem("ks_current", state.current);
      render(state.current);
    }
  };

  // ── Init ────────────────────────────────────────────────
  const savedAnswers  = sessionStorage.getItem("ks_answers");
  const savedCurrent  = sessionStorage.getItem("ks_current");
  const savedShuffled = sessionStorage.getItem("ks_shuffled");
  const mode          = sessionStorage.getItem("ks_mode") || "long";

  if (savedShuffled) {
    // Reprendre session existante
    const ids  = JSON.parse(savedShuffled);
    const qMap = {};
    QUESTIONS.forEach(q => qMap[q.id] = q);
    state.shuffled = ids.map(id => qMap[id]).filter(Boolean);
  } else {
    // Nouvelle session
    state.shuffled = mode === "short" ? selectShort([...QUESTIONS]) : shuffle([...QUESTIONS]);
    sessionStorage.setItem("ks_shuffled", JSON.stringify(state.shuffled.map(q => q.id)));
  }

  if (savedAnswers) state.answers = JSON.parse(savedAnswers);
  if (savedCurrent) state.current = parseInt(savedCurrent, 10) || 0;

  render(state.current);
})();
</script>

</body>
</html>
